# demo-nginx site config. Serves the Online Shop landing page and exposes
# nginx stub_status (used later for web/HTTP-agent monitoring).
server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Basic nginx metrics endpoint (Active connections, requests, etc.)
    location /stub_status {
        stub_status on;
        access_log off;
    }
}
