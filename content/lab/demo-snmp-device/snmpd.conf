# Minimal snmpd config for the simulated network device.
# Read-only access with community "public" over SNMP v1/v2c.
rocommunity public default

# Basic system identification (visible via SNMP sysDescr / sysName / sysLocation).
sysLocation    Docker Lab
sysContact     lab@online-shop.example
sysName        demo-snmp-device
sysServices    72

# Expose the standard host-resource and interface MIBs that net-snmp provides
# by default (UCD-SNMP-MIB, IF-MIB, etc.) — enough for template-based polling.
