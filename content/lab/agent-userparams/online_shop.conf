# Custom UserParameters for the Zabbix Certified Specialist course (Module 11).
# Loaded by the agent via Include=/etc/zabbix/zabbix_agentd.d/*.conf
#
# Flexible UserParameter: the [*] accepts an argument passed to the script as $1.
#   app.shop[orders]          -> total orders
#   app.shop[queue_length]    -> current queue length
#   app.shop[failed_payments] -> failed payments
UserParameter=app.shop[*],/usr/local/bin/online_shop.sh $1
